<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morphe Patch Tracker — Dashboard</title>
    <meta
      name="description"
      content="Automated patch tracker and change detector for Morphe application patches. Monitor new apps and updates." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />
    <link rel="alternate" type="application/rss+xml" title="Morphe Patch Tracker Changelog" href="feed.xml" />
    <link rel="stylesheet" href="assets/style.css" />
    <script defer src="https://cloud.umami.is/script.js" data-website-id="4cedfca2-6fc3-42b7-9e62-9aa4de22676e"></script>
    <script>
(function () {
  var _error = null

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

  function showErrorPage() {
    if (document.getElementById('mt-error-page')) return
    var el = document.getElementById('loading-screen')
    if (el) el.remove()
    var name = _error ? _error.name || 'Error' : 'Error'
    var msg = _error ? _error.message || 'No message' : 'No message'
    var stack = _error ? _error.stack || 'No stack trace' : 'No stack trace'
    var tech = ['React 18.3.1 + TypeScript 5.5.4','Vite 5.4.2 + React Router DOM 6.26.0','CSS custom properties (dark theme)','IndexedDB (MorpheTrackerCache)','Service Worker + Umami Analytics','Python 3 (backend crawl & diff pipeline)'].map(function(s){return '<li>'+s+'</li>'}).join('')
    var html = '<div class="error-page-box"><div class="error-page-icon">!</div><h1 class="error-page-title">Something went wrong</h1><p class="error-page-subtitle">An unexpected error occurred. The application may not function correctly.</p><div class="error-page-details"><div class="error-page-section"><span class="error-page-label">Error</span><code class="error-page-value">'+esc(name)+'</code></div><div class="error-page-section"><span class="error-page-label">Message</span><code class="error-page-value error-page-message">'+esc(msg)+'</code></div>'+(stack?'<div class="error-page-section"><span class="error-page-label">Stack Trace</span><pre class="error-page-pre">'+esc(stack)+'</pre></div>':'')+'<div class="error-page-section"><span class="error-page-label">Tech Stack</span><ul class="error-page-tech-list">'+tech+'</ul></div></div><div class="error-page-actions"><button class="error-page-btn error-page-btn-primary" onclick="location.reload()">Retry</button><button class="error-page-btn error-page-btn-copy" id="mt-copy">Copy Error Details</button></div></div>'
    var div = document.createElement('div')
    div.id = 'mt-error-page'
    div.className = 'error-page-overlay'
    div.innerHTML = html
    document.body.appendChild(div)
    document.getElementById('mt-copy').onclick = function() {
      var t = 'Error: '+name+'\nMessage: '+msg+'\nStack: '+stack+'\n\nTech Stack:\n- React 18.3.1 + TypeScript 5.5.4\n- Vite 5.4.2 + React Router DOM 6.26.0\n- CSS custom properties (dark theme)\n- IndexedDB (MorpheTrackerCache)\n- Service Worker + Umami Analytics\n- Python 3 (backend crawl & diff pipeline)\n\nURL: '+window.location.href+'\nUser Agent: '+navigator.userAgent+'\n\n--- How to fix ---\nPaste the above error details in your chat with opencode to get help fixing this issue.'
      try { navigator.clipboard.writeText(t) } catch(e) {}
    }
  }

  window.onerror = function(m, s, l, c, e) { _error = e || new Error(String(m)); showErrorPage() }
  window.onunhandledrejection = function(e) { _error = e.reason || new Error(String(e.reason)); showErrorPage() }
})()
</script>
  </head>
  <body>
    <div id="loading-screen" class="loading-overlay">
      <div class="loading-box">
        <div class="loading-logo">MT</div>
        <div class="loading-spinner"></div>
        <div class="loading-progress-text" id="loading-progress-text">Initializing...</div>
        <div class="loading-progress-bar-track">
          <div class="loading-progress-bar-fill" id="loading-progress-bar"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
