name: Update Morphe Patch Data

on:
  schedule:
    - cron: '1 */3 * * *'
  workflow_dispatch:

concurrency:
  group: morphe-patch-tracker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/run_pipeline.py

      - name: Commit and Push State Changes to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(data): auto-update Morphe patch tracking state [skip ci]"
            git push origin main
          else
            echo "No changes detected. Skipping commit to main."
          fi

      - name: Stage deployment files
        run: |
          mkdir -p publish/data
          cp index.html publish/
          cp changelog.html publish/
          cp sw.js publish/
          cp ARCHITECTURE.md publish/
          cp -r assets/ publish/
          cp data/core.json publish/data/ 2>/dev/null || echo "Warning: data/core.json not found"
          cp data/stats.json publish/data/ 2>/dev/null || echo "Warning: data/stats.json not found"
          cp data/changes.json publish/data/ 2>/dev/null || echo "Warning: data/changes.json not found"
          cp data/bundles.json publish/data/ 2>/dev/null || echo "Warning: data/bundles.json not found"
          cp data/changelog.json publish/data/ 2>/dev/null || echo "Warning: data/changelog.json not found"
          cp feed.xml publish/ 2>/dev/null || echo "Warning: feed.xml not found"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          keep_files: false
